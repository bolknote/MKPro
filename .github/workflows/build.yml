name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Only build the CLI binary (mkpro-native). Tests are intentionally not run in
# CI: the full ctest suite is too slow for the hosted runners.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (static x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DMKPRO_STATIC=ON
          -DMKPRO_WARNINGS_AS_ERRORS=OFF
      - name: Build CLI
        run: cmake --build build --target mkpro_cli -j
      - name: Smoke check
        run: |
          file build/native/mkpro-native
          ./build/native/mkpro-native compile examples/basic.mkpro --out hex
      - name: Stage binary
        run: cp build/native/mkpro-native mkpro-native-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: mkpro-native-linux-x86_64
          path: mkpro-native-linux-x86_64
          if-no-files-found: error

  windows:
    name: Windows (static x64, MinGW)
    runs-on: windows-latest
    # MSVC has no 128-bit integer type, which the exact decimal arithmetic in
    # constant_folder.cpp relies on (__int128). MinGW-w64 GCC supports __int128
    # and, with MKPRO_STATIC, links a self-contained .exe.
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64
        run: choco install mingw -y --no-progress
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DMKPRO_STATIC=ON
          -DMKPRO_WARNINGS_AS_ERRORS=OFF
      - name: Build CLI
        run: cmake --build build --target mkpro_cli -j
      - name: Smoke check
        run: ./build/native/mkpro-native.exe compile examples/basic.mkpro --out hex
      - name: Stage binary
        run: copy build\native\mkpro-native.exe mkpro-native-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: mkpro-native-windows-x64
          path: mkpro-native-windows-x64.exe
          if-no-files-found: error

  macos:
    name: macOS (universal x86_64 + arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3
          -DMKPRO_WARNINGS_AS_ERRORS=OFF
      - name: Build CLI
        run: cmake --build build --target mkpro_cli -j
      - name: Smoke check
        run: |
          lipo -info build/native/mkpro-native
          ./build/native/mkpro-native compile examples/basic.mkpro --out hex
      - name: Stage binary
        run: cp build/native/mkpro-native mkpro-native-macos-universal
      - uses: actions/upload-artifact@v4
        with:
          name: mkpro-native-macos-universal
          path: mkpro-native-macos-universal
          if-no-files-found: error

  release:
    name: Publish release
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes
