name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The per-platform jobs only build the CLI binary (mkpro-native); the full ctest
# suite is too slow for hosted runners and is run locally. The one exception is
# the fast int128-fallback job, which validates the software 128-bit integer
# (the path MSVC actually compiles) against the builtin __int128.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (static x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DMKPRO_STATIC=ON
          -DMKPRO_WARNINGS_AS_ERRORS=ON
      - name: Build CLI
        run: cmake --build build --target mkpro_cli -j
      - name: Smoke check
        run: |
          file build/native/mkpro-native
          ./build/native/mkpro-native compile examples/basic.mkpro --out hex
      - name: Strip binary
        run: strip --strip-all build/native/mkpro-native
      - name: Install UPX
        run: |
          curl -fsSL -o upx.tar.xz https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-amd64_linux.tar.xz
          tar -xf upx.tar.xz
          sudo install upx-5.0.2-amd64_linux/upx /usr/local/bin/upx
          upx --version
      - name: Compress binary
        run: upx --best --lzma build/native/mkpro-native
      - name: Packaged smoke check
        run: ./build/native/mkpro-native compile examples/basic.mkpro --out hex
      - name: Stage binary
        run: cp build/native/mkpro-native mkpro-native-linux-x86_64
      - uses: actions/upload-artifact@v6
        with:
          name: mkpro-native-linux-x86_64
          path: mkpro-native-linux-x86_64
          if-no-files-found: error

  windows:
    name: Windows (static x64, MSVC)
    runs-on: windows-latest
    # MSVC has no builtin 128-bit integer, so the exact decimal arithmetic uses
    # the software mkpro::Int128 fallback (see native/include/mkpro/core/int128.hpp).
    # CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded statically links the CRT for a
    # self-contained .exe; the int128-fallback job validates the fallback math.
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          -DMKPRO_WARNINGS_AS_ERRORS=ON
      - name: Build CLI
        run: cmake --build build --config Release --target mkpro_cli -j
      - name: Smoke check
        run: ./build/native/Release/mkpro-native.exe compile examples/basic.mkpro --out hex
      - name: Strip binary
        shell: pwsh
        run: |
          $strip = Get-Command llvm-strip -ErrorAction SilentlyContinue
          if ($strip) {
            & $strip.Source --strip-all build\native\Release\mkpro-native.exe
          } else {
            Write-Host "llvm-strip not found; skipping strip"
          }
      - name: Install UPX
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-win64.zip -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath .
          "$PWD\upx-5.0.2-win64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          .\upx-5.0.2-win64\upx.exe --version
      - name: Compress binary
        run: upx --best --lzma build\native\Release\mkpro-native.exe
      - name: Packaged smoke check
        run: ./build/native/Release/mkpro-native.exe compile examples/basic.mkpro --out hex
      - name: Stage binary
        run: copy build\native\Release\mkpro-native.exe mkpro-native-windows-x64.exe
      - uses: actions/upload-artifact@v6
        with:
          name: mkpro-native-windows-x64
          path: mkpro-native-windows-x64.exe
          if-no-files-found: error

  int128-fallback:
    name: int128 software fallback (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            config_args: ""
          - os: windows-latest
            config_args: "-A x64"
    runs-on: ${{ matrix.os }}
    # Forces MKPRO_FORCE_INT128_FALLBACK so the software 128-bit integer is the
    # active type. On Linux the builtin __int128 is present, so the self-test runs
    # a 300k-iteration differential check fallback-vs-builtin; on Windows/MSVC the
    # same fallback is compiled and exercised against the fixed vectors.
    steps:
      - uses: actions/checkout@v5
      - name: Configure (force int128 fallback)
        run: >
          cmake -S . -B build ${{ matrix.config_args }}
          -DCMAKE_BUILD_TYPE=Release
          -DMKPRO_FORCE_INT128_FALLBACK=ON
          -DMKPRO_WARNINGS_AS_ERRORS=ON
      - name: Build self-test
        run: cmake --build build --config Release --target mkpro_int128_selftest -j
      - name: Run self-test
        run: ctest --test-dir build -R int128_selftest -C Release --output-on-failure

  macos:
    name: macOS (universal x86_64 + arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3
          -DMKPRO_WARNINGS_AS_ERRORS=ON
      - name: Build CLI
        run: cmake --build build --target mkpro_cli -j
      - name: Smoke check
        run: |
          lipo -info build/native/mkpro-native
          ./build/native/mkpro-native compile examples/basic.mkpro --out hex
      - name: Strip binary
        run: strip build/native/mkpro-native
      - name: Packaged smoke check
        run: ./build/native/mkpro-native compile examples/basic.mkpro --out hex
      - name: Stage binary
        run: cp build/native/mkpro-native mkpro-native-macos-universal
      - uses: actions/upload-artifact@v6
        with:
          name: mkpro-native-macos-universal
          path: mkpro-native-macos-universal
          if-no-files-found: error

  mkpro-native-ape-universal:
    name: APE (linux x86_64 + aarch64, xnu, windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
      - name: Fetch cosmocc toolchain
        run: |
          set -euo pipefail
          ok=0
          for url in \
            https://cosmo.zip/pub/cosmocc/cosmocc.zip \
            https://cosmo.zip/pub/cosmos/bin/cosmocc.zip \
            https://github.com/jart/cosmopolitan/releases/latest/download/cosmocc.zip; do
            echo "Trying to download cosmocc from $url"
            if curl -fsSL -o /tmp/cosmocc.zip "$url"; then
              ok=1
              break
            fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "Failed to download cosmocc from all known sources"
            exit 1
          fi
          unzip -q /tmp/cosmocc.zip -d /tmp/cosmocc
      - name: Configure and build Linux x86_64 target with cosmocc
        run: |
          CC=/tmp/cosmocc/bin/x86_64-unknown-cosmo-cc \
          CXX=/tmp/cosmocc/bin/x86_64-unknown-cosmo-c++ \
            cmake -S . -B build/mkpro-ape-x86_64_linux \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=x86_64 \
              -DMKPRO_STATIC=ON \
              -DMKPRO_WARNINGS_AS_ERRORS=OFF
          cmake --build build/mkpro-ape-x86_64_linux --target mkpro_cli -j
      - name: Configure and build Linux aarch64 target with cosmocc
        run: |
          CC=/tmp/cosmocc/bin/aarch64-unknown-cosmo-cc \
          CXX=/tmp/cosmocc/bin/aarch64-unknown-cosmo-c++ \
            cmake -S . -B build/mkpro-ape-aarch64_linux \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
              -DMKPRO_STATIC=ON \
              -DMKPRO_WARNINGS_AS_ERRORS=OFF
          cmake --build build/mkpro-ape-aarch64_linux --target mkpro_cli -j
      - name: Build APE universal binary
        run: |
          /tmp/cosmocc/bin/apelink \
            -V linux,xnu,windows \
            -l /tmp/cosmocc/bin/ape-x86_64.elf \
            -l /tmp/cosmocc/bin/ape-aarch64.elf \
            -M /tmp/cosmocc/bin/ape-m1.c \
            -o mkpro-native-universal.com \
            build/mkpro-ape-x86_64_linux/mkpro-native \
            build/mkpro-ape-aarch64_linux/mkpro-native
      - name: Smoke check
        run: |
          file mkpro-native-universal.com
          ./mkpro-native-universal.com --help | sed -n '1,20p'
          ./mkpro-native-universal.com compile examples/basic.mkpro --out hex | head -n 3
      - uses: actions/upload-artifact@v6
        with:
          name: mkpro-native-universal.com
          path: mkpro-native-universal.com
          if-no-files-found: error

  release:
    name: Publish release
    needs: [linux, windows, macos, int128-fallback, mkpro-native-ape-universal]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --clobber
          else
            gh release create "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes
          fi
